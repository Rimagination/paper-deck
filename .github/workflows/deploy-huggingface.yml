name: Deploy to Hugging Face Space

on:
  push:
    branches: [main, clean-main]
  workflow_dispatch:

concurrency:
  group: deploy-paperdeck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secret
        env:
          HF_SPACE_TOKEN: ${{ secrets.HF_SPACE_TOKEN }}
        run: |
          if [ -z "$HF_SPACE_TOKEN" ]; then
            echo "HF_SPACE_TOKEN is not configured."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Frontend build smoke test
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit generated frontend bundle for Hugging Face
        run: |
          if ! git diff --quiet -- frontend/dist; then
            git status --short -- frontend/dist
            git add frontend/dist
            git commit -m "Build frontend bundle for Hugging Face"
          fi

      - name: Backend import smoke test
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          python -c "from backend.main import app; print(app.title)"

      - name: Push repository to Hugging Face Space
        env:
          HF_SPACE_TOKEN: ${{ secrets.HF_SPACE_TOKEN }}
          HF_SPACE_URL: https://oauth2:${{ secrets.HF_SPACE_TOKEN }}@huggingface.co/spaces/Rimagination/paper-deck
        run: |
          git remote remove hf || true
          git remote add hf "$HF_SPACE_URL"
          git push hf HEAD:main --force

      - name: Deployment summary
        run: echo "Synced the current GitHub deploy branch to Hugging Face Space main."
